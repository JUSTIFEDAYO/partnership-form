<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Partnership Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <h1>CONTRACT PARTNERSHIP FORM</h1>

      <div class="progress-bar">
        <div class="step active" id="step01">
          <span>01</span>
          <p>PERSONAL</p>
        </div>
        <div class="step" id="step02">
          <span>02</span>
          <p>TAX ID</p>
        </div>
        <div class="step" id="step03">
          <span>03</span>
          <p>ADDRESS</p>
        </div>
        <div class="step" id="step04">
          <span>04</span>
          <p>CERTIFY</p>
        </div>
      </div>

      <form
        id="multiStepForm"
        action="/submit"
        method="POST"
        enctype="multipart/form-data"
      >
        <div class="form-section active" id="section1">
          <h2>Personal / Legal Info</h2>
          <label>Full Legal Name</label>
          <input type="text" name="fullName" required />

          <label>Business Name (optional)</label>
          <input type="text" name="businessName" />

          <label>Entity Type</label>
          <div class="checkbox-group">
            <label
              ><input type="checkbox" name="entity" value="Sole Proprietor" />
              Individual / Sole Proprietor</label
            >
            <label
              ><input type="checkbox" name="entity" value="LLC" /> LLC</label
            >
            <label
              ><input type="checkbox" name="entity" value="Corporation" />
              Corporation</label
            >
            <label
              ><input type="checkbox" name="entity" value="Partnership" />
              Partnership</label
            >
          </div>
          <button type="button" onclick="nextSection(2)">Next</button>
        </div>

        <div class="form-section" id="section2">
          <h2>Tax Identification</h2>
          <label>SSN Number</label>
          <input type="text" name="ssn" placeholder="XXX-XX-XXXX" required />

          <label>ID Upload</label>
          <input type="file" name="idImage" accept="image/*,.pdf" required />

          <div class="btn-group">
            <button type="button" onclick="nextSection(1)">Back</button>
            <button type="button" onclick="nextSection(3)">Next</button>
          </div>
        </div>

        <div class="form-section" id="section3">
          <h2>Address</h2>
          <input type="text" name="street" placeholder="Street" required />
          <input type="text" name="city" placeholder="City" required />
          <input type="text" name="state" placeholder="State" required />
          <input type="text" name="zip" placeholder="ZIP Code" required />

          <div class="btn-group">
            <button type="button" onclick="nextSection(2)">Back</button>
            <button type="button" onclick="nextSection(4)">Next</button>
          </div>
        </div>

        <div class="form-section" id="section4">
          <h2>Certification</h2>
          <label>
            <input type="checkbox" id="certifyCheck" required /> I certify the
            information is correct
          </label>

          <label>Digital Signature</label>
          <input
            type="text"
            name="signature"
            placeholder="Type your full name as signature"
            required
          />

          <label>Date</label>
          <input type="text" id="autoDate" name="date" readonly />

          <div class="btn-group">
            <button type="button" onclick="nextSection(3)">Back</button>
            <button type="submit">Submit Form</button>
          </div>
        </div>
      </form>
    </div>

    <script>
      // Auto-fill today's date
      document.getElementById("autoDate").value =
        new Date().toLocaleDateString();

      function nextSection(sectionNum) {
        // Hide all sections
        document
          .querySelectorAll(".form-section")
          .forEach((sec) => sec.classList.remove("active"));
        // Show target section
        document.getElementById("section" + sectionNum).classList.add("active");

        // Update Progress Bar
        document.querySelectorAll(".step").forEach((step, index) => {
          if (index + 1 <= sectionNum) step.classList.add("active");
          else step.classList.remove("active");
        });
      }
    </script>
  </body>
</html>
